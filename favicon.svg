<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>
  <!-- outer gold diamond -->
  <polygon points="16,3 29,16 16,29 3,16" fill="#c8a84b"/>
  <!-- inner dark diamond — creates the "jade mark" hollow effect -->
  <polygon points="16,9 23,16 16,23 9,16" fill="#1a1a1a" opacity="0.5"/>
</svg>
