<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark editorial background -->
  <rect width="32" height="32" fill="#111111"/>
  <!-- gold accent bar at top — masthead stripe, like The Economist / FT -->
  <rect x="0" y="0" width="32" height="4" fill="#c8a84b"/>
  <!-- bold site initial: 野 -->
  <text
    x="16" y="27"
    font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei','SimHei',sans-serif"
    font-size="21"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
  >野</text>
</svg>
